; PlatformIO project for ESP32-2432S028R (CYD) Flight Radar
; Board: ESP32-WROOM-32, 2.8" ILI9341 320x240 SPI TFT, no touch used.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
; Lower upload speed first — many CYD clones have marginal USB-serial chips
; that fail at the default 921600 baud. Bump back up once flashing is reliable.
upload_speed = 115200

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    tzapu/WiFiManager@^2.0.17
    bblanchon/ArduinoJson@^7.2.0

build_flags =
    -Iinclude
    -include include/User_Setup.h

; This board's auto-reset circuit doesn't reliably enter bootloader mode via
; esptool's default DTR/RTS toggle, so bootloader entry must be done manually
; (hold BOOT, tap RST, release). before_reset=no_reset stops esptool from
; overriding that manual entry with its own (failing) auto-reset attempt.
board_upload.before_reset = no_reset
